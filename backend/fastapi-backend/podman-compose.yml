version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/realms/${KEYCLOAK_REALM:-myrealm}/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 50
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: /app
      # sync URL for Alembic (runtime uses DATABASE_URL from .env)
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://app:secret@db:5432/app
    depends_on:
      db:
        condition: service_healthy
      #keycloak:
      #  condition: service_healthy
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  db_data:
