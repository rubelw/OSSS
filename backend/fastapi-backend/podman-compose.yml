version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  realmgen:
    image: python:3.12-alpine
    # Use a shell so we can install PyYAML then run the generator
    command:
      - sh
      - -lc
      - |
        set -eux
        python -m pip install --no-cache-dir pyyaml
        test -f /keycloak/templates/realm-import.template.json
        test -f /role-rules.yaml
        python /scripts/gen_realm_from_yaml.py \
          --template /keycloak/templates/realm-import.template.json \
          --in /role-rules.yaml \
          --out /keycloak/import/realm-export.json
        ls -l /keycloak/import/realm-export.json
    volumes:
      - ./keycloak/templates:/keycloak/templates:Z
      - ./keycloak/import:/keycloak/import:Z
      - ./scripts:/scripts:ro,Z
      - ./role-rules.yaml:/role-rules.yaml:ro,Z
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: [ "start-dev", "--import-realm" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      - realmgen
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/realms/${KEYCLOAK_REALM:-myrealm}/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 50
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: /app
      # sync URL for Alembic (runtime uses DATABASE_URL from .env)
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://app:secret@db:5432/app
    depends_on:
      db:
        condition: service_healthy
      #keycloak:
      #  condition: service_healthy
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  db_data:
