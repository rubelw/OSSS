realm: myrealm

realm_roles:
  admin: admin
  editor: editor
  viewer: viewer
  hr: hr
  records_reader: records_reader
  records_editor: records_editor

clients:
  myapi:
    roles:
      - api-admin
      - api-editor

routes:
  "GET /users": ["admin"]
  "POST /users": ["admin", "hr"]

  # example router-prefixed paths
  "GET /repo/documents": ["records_reader"]
  "POST /repo/documents": ["records_editor"]
